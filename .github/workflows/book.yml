name: Book

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - ".github/workflows/book.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install mdBook + mermaid (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook,mdbook-mermaid
      - name: Build
        run: |
          mdbook-mermaid install book   # adds the mermaid assets + config
          mdbook build book
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
