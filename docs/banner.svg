<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cathar — restore the audio in any video, in pure Rust">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3f4fb"/>
      <stop offset="1" stop-color="#fdfdff"/>
    </linearGradient>
    <!-- waveform colour journey: raw/clipped orange -> processing indigo -> clean teal -->
    <linearGradient id="wave" x1="70" y1="0" x2="1130" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#f97316"/>
      <stop offset="0.22" stop-color="#f4843a"/>
      <stop offset="0.45" stop-color="#6f6ae6"/>
      <stop offset="0.72" stop-color="#2ba0c8"/>
      <stop offset="1"    stop-color="#13b9a6"/>
    </linearGradient>
    <!-- product tile gradient (cool clean-signal: indigo into cyan) -->
    <linearGradient id="cat" x1="30" y1="20" x2="210" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#3284e0"/>
      <stop offset="1" stop-color="#15c0c6"/>
    </linearGradient>
    <linearGradient id="catEdge" x1="120" y1="16" x2="120" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.16"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#d6dbea"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="58%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="tileShadow" x="-40%" y="-40%" width="180%" height="190%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#2a3566" flood-opacity="0.22"/>
    </filter>
    <clipPath id="card"><rect x="1" y="1" width="1198" height="628" rx="18"/></clipPath>
  </defs>

  <rect x="1" y="1" width="1198" height="628" rx="18" fill="url(#bg)" stroke="#e6e8f1" stroke-width="2"/>

