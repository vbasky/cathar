<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=640">
<title>tersus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    background: #0a0a0f;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .card {
    position: relative;
    width: 960px;
    height: 400px;
    background: linear-gradient(135deg, #111118 0%, #0d0d14 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 120px rgba(60, 140, 220, 0.08),
                0 0 30px rgba(60, 140, 220, 0.04);
  }

  /* Ambient glow behind the card */
  .card::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 26px;
    background: linear-gradient(135deg, rgba(60,140,220,0.15), rgba(100,60,220,0.1), rgba(60,140,220,0.05));
    z-index: -1;
    filter: blur(20px);
  }

  /* Audio waveform decoration */
  .waveform {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.12;
    pointer-events: none;
  }

  .waveform-row {
    display: flex;
    gap: 3px;
    align-items: center;
    position: absolute;
    width: 80%;
  }

  .waveform-row:nth-child(1) { top: 18%; }
  .waveform-row:nth-child(2) { top: 38%; }
  .waveform-row:nth-child(3) { top: 58%; }
  .waveform-row:nth-child(4) { top: 78%; }

  .bar {
    background: linear-gradient(180deg, #3c8cdc, #643cdc);
    border-radius: 2px;
    width: 4px;
    animation: pulse var(--d) ease-in-out infinite alternate;
    opacity: 0.6;
  }

  .bar.clear {
    background: linear-gradient(180deg, #22c55e, #3c8cdc);
    opacity: 1;
  }

  @keyframes pulse {
    0%   { height: var(--h1); }
    100% { height: var(--h2); }
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #3c8cdc 0%, #8b5cf6 50%, #3c8cdc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    font-size: 22px;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.02em;
    max-width: 520px;
    line-height: 1.5;
  }

  .tagline span {
    color: rgba(255,255,255,0.8);
    font-weight: 400;
  }

  .badge-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .badge {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 5px 14px;
    letter-spacing: 0.01em;
  }

  .cta {
    margin-top: 8px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 15px;
    color: rgba(60,140,220,0.7);
    background: rgba(60,140,220,0.06);
    border: 1px solid rgba(60,140,220,0.12);
    border-radius: 8px;
    padding: 10px 28px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="card">
  <!-- Decorative waveform bars -->
  <div class="waveform">
    <div class="waveform-row" style="top:20%">
      <div class="bar" style="--h1:12px;--h2:44px;--d:0.8s"></div><div class="bar" style="--h1:8px;--h2:38px;--d:1.1s"></div><div class="bar" style="--h1:18px;--h2:52px;--d:0.7s"></div><div class="bar" style="--h1:10px;--h2:30px;--d:0.9s"></div><div class="bar" style="--h1:6px;--h2:48px;--d:1.3s"></div><div class="bar" style="--h1:14px;--h2:36px;--d:0.6s"></div><div class="bar" style="--h1:22px;--h2:56px;--d:1.0s"></div><div class="bar" style="--h1:4px;--h2:28px;--d:1.2s"></div><div class="bar" style="--h1:16px;--h2:42px;--d:0.8s"></div><div class="bar" style="--h1:24px;--h2:50px;--d:1.1s"></div><div class="bar" style="--h1:8px;--h2:34px;--d:0.7s"></div><div class="bar" style="--h1:20px;--h2:46px;--d:1.4s"></div><div class="bar" style="--h1:12px;--h2:40px;--d:0.9s"></div><div class="bar" style="--h1:6px;--h2:32px;--d:1.0s"></div><div class="bar" style="--h1:18px;--h2:54px;--d:0.8s"></div>
    </div>
    <!-- Clean row (lower noise waveform) -->
    <div class="waveform-row" style="top:77%">
      <div class="bar clear" style="--h1:44px;--h2:48px;--d:0.8s"></div><div class="bar clear" style="--h1:34px;--h2:38px;--d:1.1s"></div><div class="bar clear" style="--h1:50px;--h2:52px;--d:0.7s"></div><div class="bar clear" style="--h1:28px;--h2:32px;--d:0.9s"></div><div class="bar clear" style="--h1:46px;--h2:48px;--d:1.3s"></div><div class="bar clear" style="--h1:36px;--h2:40px;--d:0.6s"></div><div class="bar clear" style="--h1:54px;--h2:56px;--d:1.0s"></div><div class="bar clear" style="--h1:26px;--h2:30px;--d:1.2s"></div><div class="bar clear" style="--h1:42px;--h2:44px;--d:0.8s"></div><div class="bar clear" style="--h1:48px;--h2:50px;--d:1.1s"></div><div class="bar clear" style="--h1:32px;--h2:36px;--d:0.7s"></div><div class="bar clear" style="--h1:44px;--h2:48px;--d:1.4s"></div><div class="bar clear" style="--h1:38px;--h2:40px;--d:0.9s"></div><div class="bar clear" style="--h1:30px;--h2:34px;--d:1.0s"></div><div class="bar clear" style="--h1:52px;--h2:54px;--d:0.8s"></div>
    </div>
  </div>

  <!-- Text -->
  <div class="content">
    <div class="logo">tersus</div>
    <div class="tagline">
      <span>AI denoising</span> for video audio — clean dialogue, remove noise, isolate speech
    </div>
    <div class="badge-row">
      <span class="badge">ONNX Runtime</span>
      <span class="badge">Pure Rust</span>
      <span class="badge">Demucs-style</span>
    </div>
    <div class="cta">$ tersus denoise noisy_interview.mp4 --out clean.wav</div>
  </div>
</div>
</body>
</html>
